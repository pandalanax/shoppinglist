<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Shopping List</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#111111" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Shopping" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>Shopping List</h1>
    <div class="app-header__actions">
      <button id="refreshBtn" aria-label="Refresh">⟳</button>
      <button id="settingsBtn" aria-label="Settings">⚙</button>
    </div>
  </header>

  <main id="list" class="list"></main>

  <div id="toast" class="toast" hidden></div>

  <dialog id="settings" class="sheet">
    <form method="dialog" id="settingsForm">
      <h2>Settings</h2>
      <label>Server URL
        <span class="field">
          <input type="url" id="serverUrl" placeholder="https://recipes.example.com" required
                 autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
          <button type="button" class="paste" data-target="serverUrl">Paste</button>
        </span>
      </label>
      <label>API Token
        <span class="field">
          <input type="text" id="token" placeholder="Tandoor API token" required
                 autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
          <button type="button" class="paste" data-target="token">Paste</button>
        </span>
      </label>
      <p class="paste-msg" id="pasteMsg" aria-live="polite"></p>
      <menu>
        <button value="cancel">Cancel</button>
        <button value="save" id="saveSettings">Save</button>
      </menu>
    </form>
  </dialog>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
</body>
</html>
