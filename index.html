<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Shopping List</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#111111" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Shopping" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>Shopping List <span class="ver"></span></h1>
    <div class="app-header__actions">
      <button id="refreshBtn" aria-label="Refresh">⟳</button>
      <button id="settingsBtn" aria-label="Settings">⚙</button>
    </div>
  </header>

  <main id="list" class="list"></main>

  <div id="toast" class="toast" hidden></div>

  <section id="settings" class="sheet" hidden>
    <form id="settingsForm">
      <h2>Settings</h2>
      <label>Server URL
        <input type="url" id="serverUrl" placeholder="https://recipes.example.com" required
               autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
      </label>
      <label>API Token
        <input type="text" id="token" placeholder="Tandoor API token" required
               autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" />
      </label>
      <menu>
        <button type="button" id="cancelSettings">Cancel</button>
        <button type="submit" id="saveSettings">Save</button>
      </menu>
    </form>
  </section>

  <script src="js/env.js"></script>
  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        // updateViaCache:'none' = never serve sw.js from the HTTP cache when
        // checking for updates, so iOS actually notices a new version instead
        // of getting stuck on an old worker (the cause of "still loads 0.1.8").
        const reg = await navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' });
        reg.update();
        // When a freshly-installed worker takes control, reload once so the
        // visible page swaps to the new version without reinstalling the app.
        let reloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (reloaded) return;
          reloaded = true;
          location.reload();
        });
      });
    }
  </script>
</body>
</html>
